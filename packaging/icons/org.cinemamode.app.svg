    <radialGradient id="hub" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#eccf8d"/>
      <stop offset="100%" stop-color="#d8b86a"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="none" stroke="#a6192e" stroke-opacity="0.35" stroke-width="2"/>

