  <circle cx="87.4" cy="50.5" r="11" fill="#0a0a0d" stroke="#a6893f" stroke-width="2"/>
  <circle cx="87.4" cy="77.5" r="11" fill="#0a0a0d" stroke="#a6893f" stroke-width="2"/>
  <circle cx="64" cy="91" r="11" fill="#0a0a0d" stroke="#a6893f" stroke-width="2"/>
  <circle cx="40.6" cy="77.5" r="11" fill="#0a0a0d" stroke="#a6893f" stroke-width="2"/>
  <circle cx="40.6" cy="50.5" r="11" fill="#0a0a0d" stroke="#a6893f" stroke-width="2"/>

